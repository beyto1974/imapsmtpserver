name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p build dist

          bin=imapsmtpserver
          if [ "$GOOS" = "windows" ]; then bin=imapsmtpserver.exe; fi
          go build -o "build/$bin" ./cmd/imapsmtpserver

          name="imapsmtpserver-${GOOS}-${GOARCH}"
          cd build
          if [ "$GOOS" = "windows" ]; then
            zip "../dist/$name.zip" "$bin"
          else
            tar -czf "../dist/$name.tar.gz" "$bin"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: imapsmtpserver-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
