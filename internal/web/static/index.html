<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ImapSmtpServer</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <h1>ImapSmtpServer</h1>
  <div id="header-actions">
    <button id="compose-btn">Compose</button>
    <button id="clear-all">Clear all</button>
  </div>
</header>
<main>
  <section id="list-pane">
    <div id="account-bar">
      <select id="account-select">
        <option value="">All mail</option>
      </select>
      <div id="folder-tabs" hidden>
        <button class="folder-btn active" data-folder="inbox">Inbox</button>
        <button class="folder-btn" data-folder="sent">Sent</button>
      </div>
    </div>
    <ul id="message-list"></ul>
  </section>
  <section id="detail-pane">
    <p id="empty-state">Select a message to view it.</p>
    <div id="detail" hidden>
      <div id="detail-header">
        <h2 id="detail-subject"></h2>
        <dl>
          <dt>From</dt><dd id="detail-from"></dd>
          <dt>To</dt><dd id="detail-to"></dd>
          <dt>Date</dt><dd id="detail-date"></dd>
        </dl>
        <button id="detail-reply">Reply</button>
        <button id="detail-clear">Clear this message</button>
      </div>
      <div id="tabs">
        <button class="tab-btn active" data-tab="html">HTML</button>
        <button class="tab-btn" data-tab="text">Text</button>
        <button class="tab-btn" data-tab="raw">Raw</button>
      </div>
      <div id="tab-html" class="tab-panel active">
        <iframe id="html-frame" sandbox></iframe>
      </div>
      <pre id="tab-text" class="tab-panel"></pre>
      <pre id="tab-raw" class="tab-panel"></pre>
      <ul id="attachments"></ul>
    </div>
  </section>
</main>
<div id="compose-overlay" hidden>
  <form id="compose-form">
    <h2>New message</h2>
    <label>From <input type="text" id="compose-from" list="account-datalist" required></label>
    <datalist id="account-datalist"></datalist>
    <label>To <input type="text" id="compose-to" required></label>
    <label>Subject <input type="text" id="compose-subject"></label>
    <label>Message <textarea id="compose-text" rows="10"></textarea></label>
    <p id="compose-error" hidden></p>
    <div id="compose-actions">
      <button type="submit">Send</button>
      <button type="button" id="compose-cancel">Cancel</button>
    </div>
  </form>
</div>
<script src="/app.js"></script>
</body>
</html>
